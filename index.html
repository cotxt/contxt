<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>loop — Self-management built for ADHD brains</title>
<link rel="icon" href="assets/loop-logo.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#0a0908;
    --ink:#f4f2ed;
    --dim:0.12;          /* baseline opacity of un-lit words */
    --red:#e4f92e;
    --hair:rgba(244,242,237,0.12);
    --pace:5;            /* reveal spread (set by tweak) */
    --font:"Pretendard", "Pretendard Variable", -apple-system, system-ui, sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font);
    font-weight:500;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* subtle filmic vignette so pure black edges don't feel flat */
  body::after{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background:radial-gradient(130% 100% at 50% 0%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  ::selection{ background:var(--red); color:#0a0908; }

  /* ---------- type primitives ---------- */
  .eyebrow{
    font-family:var(--font);
    font-size:clamp(0.66rem,1vw,0.8rem);
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--red);
  }
  .word{
    opacity:var(--dim);
    transition:opacity .08s linear;
    will-change:opacity;
  }
  .word.w-accent{ color:var(--red); }

  /* ---------- nav ---------- */
  nav.top{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:clamp(16px,2vw,26px) clamp(18px,3.5vw,46px);
    mix-blend-mode:normal;
  }
  .brandmark{ display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--ink); }
  .brandmark img{ height:30px; width:auto; display:block; border-radius:4px; }
  .brandmark .wm{ font-weight:700; letter-spacing:0.02em; font-size:1.05rem; }
  .navjoin{
    font-family:var(--font);
    font-size:0.72rem; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--ink); text-decoration:none;
    border:1px solid var(--hair); border-radius:100px; white-space:nowrap;
    padding:9px 18px; transition:.25s ease;
  }
  .navjoin:hover{ background:var(--ink); color:var(--bg); border-color:var(--ink); }

  /* ---------- hero ---------- */
  .hero{ position:relative; min-height:100svh; display:flex; padding:clamp(18px,3.5vw,46px); padding-bottom:clamp(86px,9vw,130px); z-index:2; }
  .hero .eyebrow{ opacity:0; animation:fadeUp .9s .15s ease forwards; }
  .hero h1{
    font-weight:700; line-height:0.92; letter-spacing:-0.035em;
    text-wrap:balance;
  }
  .hero h1 .ln{ display:block; opacity:0; transform:translateY(0.4em); animation:fadeUp 1s ease forwards; }
  .hero .sub{ opacity:0; animation:fadeUp .9s ease forwards; color:rgba(244,242,237,0.6); }
  .hero .cue{
    position:absolute; bottom:clamp(22px,3vw,40px); right:clamp(20px,3.5vw,46px);
    font-family:var(--font); font-size:0.72rem; letter-spacing:0.22em; text-transform:uppercase;
    color:rgba(244,242,237,0.45); display:flex; align-items:center; gap:10px;
    opacity:0; animation:fadeUp 1s 1.1s ease forwards;
  }
  .hero .cue .bar{ width:1px; height:34px; background:var(--ink); transform-origin:top; animation:cue 1.8s ease-in-out infinite; }
  @keyframes cue{ 0%,100%{ transform:scaleY(0.25); opacity:.4 } 50%{ transform:scaleY(1); opacity:1 } }
  @keyframes fadeUp{ to{ opacity:1; transform:none; } }

  /* --- hero: MINIMAL (left editorial) --- */
  .hero.h-minimal{ align-items:flex-end; }
  .hero.h-minimal .inner{ max-width:1500px; }
  .hero.h-minimal .eyebrow{ margin-bottom:clamp(20px,3vw,34px); }
  .hero.h-minimal h1{ font-size:clamp(3.1rem,12vw,12.5rem); }
  .hero.h-minimal h1 .ln:nth-child(2){ animation-delay:.18s; }
  .hero.h-minimal h1 .ln:nth-child(3){ animation-delay:.32s; }
  .hero.h-minimal .sub{ margin-top:clamp(22px,2.6vw,38px); font-size:clamp(1rem,1.5vw,1.45rem); max-width:30ch; animation-delay:.7s; }

  /* --- hero: BOLD (centered, big mark) --- */
  .hero.h-bold{ align-items:center; justify-content:center; text-align:center; }
  .hero.h-bold .inner{ display:flex; flex-direction:column; align-items:center; }
  .hero.h-bold .bigmark{ width:clamp(230px,30vw,460px); height:auto; border-radius:10px; margin-bottom:clamp(26px,3.6vw,52px); opacity:0; animation:fadeUp .9s .1s ease forwards; box-shadow:0 24px 80px -28px var(--red); }
  .hero.h-bold .eyebrow{ margin-bottom:clamp(20px,2.6vw,30px); }
  .hero.h-bold h1{ font-size:clamp(2.8rem,9.5vw,10rem); }
  .hero.h-bold h1 .ln:nth-child(2){ animation-delay:.16s; }
  .hero.h-bold .sub{ margin-top:clamp(22px,2.6vw,36px); font-size:clamp(1rem,1.5vw,1.4rem); max-width:34ch; animation-delay:.62s; }
  .hero.h-bold .cue{ left:50%; right:auto; transform:translateX(-50%); }
  .hero.h-minimal .bigmark{ display:none; }

  .accent-ink{ color:var(--red); }

  /* ---------- pinned statement stages ---------- */
  .stage{ position:relative; min-height:155vh; z-index:2; }
  .stage.short{ min-height:135vh; }
  .stage-inner{
    position:sticky; top:0; height:100svh;
    display:flex; flex-direction:column; justify-content:center;
    padding:clamp(28px,6vw,120px); gap:clamp(20px,2.4vw,34px);
  }
  .stage .eyebrow{ opacity:0.9; }
  .statement{
    font-weight:600; line-height:1.04; letter-spacing:-0.025em;
    font-size:clamp(2rem,6.6vw,6.4rem);
    max-width:18ch; text-wrap:balance;
  }
  .stage.wide .statement{ max-width:24ch; }

  /* how-it-works: stacked reveal lines */
  .howlist{ display:flex; flex-direction:column; gap:clamp(18px,2.4vw,40px); max-width:100%; }
  .howline{ font-weight:600; line-height:1.05; letter-spacing:-0.02em; font-size:clamp(1.5rem,4.6vw,3.6rem); max-width:20ch; text-wrap:balance; }
  .howline .num{ font-family:var(--font); font-size:0.42em; color:var(--red); vertical-align:super; margin-right:0.5em; letter-spacing:0; }

  /* ---------- CTA ---------- */
  .cta-inner{ align-items:flex-start; }
  .cta-head{ font-weight:700; line-height:0.95; letter-spacing:-0.035em; font-size:clamp(2.8rem,9vw,8.5rem); max-width:16ch; }
  .form{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    margin-top:clamp(26px,3vw,44px); width:min(560px,100%);
    opacity:0; transform:translateY(14px); transition:.7s ease;
  }
  .form.in{ opacity:1; transform:none; }
  .form input{
    flex:1 1 240px; min-width:0;
    background:transparent; border:none; border-bottom:1.5px solid var(--hair);
    color:var(--ink); font-family:var(--font); font-size:1.15rem; font-weight:500;
    padding:14px 4px; outline:none; transition:border-color .25s;
  }
  .form input::placeholder{ color:rgba(244,242,237,0.32); }
  .form input:focus{ border-color:var(--red); }
  .form button{
    flex:0 0 auto; cursor:pointer;
    background:var(--red); color:#044f39; border:none; border-radius:100px;
    font-family:var(--font); font-weight:700; font-size:0.82rem; letter-spacing:0.16em; text-transform:uppercase;
    padding:15px 28px; transition:transform .2s ease, filter .2s ease;
  }
  .form button:hover{ transform:translateY(-2px); filter:brightness(1.08); }
  .form button:active{ transform:translateY(0); }
  .formnote{ margin-top:14px; font-family:var(--font); font-size:0.74rem; letter-spacing:0.04em; color:rgba(244,242,237,0.4); min-height:1em; }
  .formnote.ok{ color:var(--red); }
  .err{ border-bottom-color:var(--red) !important; }

  /* ---------- footer ---------- */
  footer{ position:relative; z-index:2; padding:clamp(40px,6vw,90px) clamp(18px,3.5vw,46px) clamp(30px,4vw,56px); border-top:1px solid var(--hair); }
  .footmark{ font-weight:700; letter-spacing:-0.03em; line-height:0.82; color:var(--red); font-size:clamp(4rem,22vw,22rem); }
  .footrow{ display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:24px; margin-top:clamp(24px,3vw,40px); }
  .footrow .left{ display:flex; align-items:center; gap:14px; }
  .footrow img{ height:40px; width:auto; border-radius:6px; }
  .footrow .meta{ font-family:var(--font); font-size:0.72rem; letter-spacing:0.1em; color:rgba(244,242,237,0.42); line-height:1.7; text-transform:uppercase; }
  .footrow .links{ display:flex; gap:22px; font-family:var(--font); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; }
  .footrow .links a{ color:rgba(244,242,237,0.6); text-decoration:none; transition:color .2s; }
  .footrow .links a:hover{ color:var(--red); }

  /* progress rail */
  .rail{ position:fixed; top:0; left:0; height:2px; background:var(--red); width:0; z-index:60; }

  @media (max-width:640px){
    .navjoin{ display:none; }
    .statement{ max-width:14ch; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
